# https://detekt.dev/docs/1.23.8/rules/formatting
config:
  validation: true
  warningsAsErrors: false
  excludes: ''

# how to configure detekt to autofix
formatting:
  active: true
  autoCorrect: true # This property is deprecated in newer versions and should be set via Gradle/CLI
  MaximumLineLength:
    active: true
    autoCorrect: true
  FinalNewline:
    active: true
    autoCorrect: true

style:
  MagicNumber:
    # Allows numbers in property declarations, useful for colors/dimensions
    ignorePropertyDeclaration: true
    active: false # Disable a specific rule
  UnusedPrivateMember:
    # Ignores unused private members annotated with @Preview
    ignoreAnnotated: ['Preview']

# configure ktlint and detekt android compose project
build:
  maxIssues: 200 # Fail the build if any issues are found
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

complexity:
  TooManyFunctions:
    thresholdInFiles: 15
    active: true
    ignoreAnnotatedFunctions: ['Preview']
  LongParameterList:
    # Increase the threshold for parameter count, common in Composable functions
    functionThreshold: 5
    constructorThreshold: 6
  CyclomaticComplexMethod:
    threshold: 15 # rever essa regra
    ignoreNestingFunctions: true
  LongMethod:
    threshold: 30 # rever essa regra
  # https://detekt.dev/docs/1.23.0/rules/complexity#nestedblockdepth
  NestedBlockDepth:
    threshold: 3 # rever essa regra

coroutines:
  GlobalCoroutineUsage:
    active: true # Disable if you have specific patterns for coroutine usage
  InjectDispatcher:
    dispatcherNames: ['IO', 'Default', 'Main']
    active: true
performance:
    ForEachOnRange:
        active: true # Disable if you have specific patterns for using forEach on ranges
    CouldBeSequence:
        active: true # Disable if you have specific patterns for using collections that could be sequences
    UnnecessaryPartOfBinaryExpression:
        active: true # Disable if you have specific patterns for binary expressions that may be necessary
naming:
  FunctionNaming:
    # Allows PascalCase for functions annotated with @Composable
    ignoreAnnotated: [ 'Composable' ]
potential-bugs:
  UnnecessarySafeCall:
    active: true # Disable if you have specific patterns for safe calls that may be necessary
  UnnecessaryNotNullCheck:
    active: true # Disable if you have specific patterns for not-null checks that may be necessary

console-reports:
  active: true
  exclude:
    #  - 'ProjectStatisticsReport'
    #  - 'ComplexityReport'
    #  - 'NotificationReport'
    #  - 'FindingsReport'
    #  - 'FileBasedFindingsReport'
    - 'LiteFindingsReport'
